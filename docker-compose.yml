version: "3.9"

x-common-env: &common-env
  DB_HOST: ${DB_HOST:-mysql}
  DB_PORT: ${DB_PORT:-3306}
  DB_USER: ${DB_USER:-nexus}
  DB_PASSWORD: ${DB_PASSWORD:-nexus_secret}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-prod}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  BRAVE_API_KEY: ${BRAVE_API_KEY}

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_USER: ${MYSQL_USER:-nexus}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nexus_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nexus-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nexus-net

  # ─── Application Services ─────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DB_NAME: ${AUTH_DB_NAME:-nexus_auth}
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-60}
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: ${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-7}
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,auth-service,nginx"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    command: >
      sh -c "python manage.py migrate &&
             gunicorn auth_service.wsgi:application --bind 0.0.0.0:8001 --workers 2"
    networks:
      - nexus-net

  core-api:
    build:
      context: ./services/core-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DB_NAME: ${DB_NAME:-nexus_core}
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,core-api,nginx"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 core_api.asgi:application"
    networks:
      - nexus-net

  scraper-service:
    build:
      context: ./services/scraper-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DB_NAME: ${DB_NAME:-nexus_core}
      SELENIUM_HEADLESS: ${SELENIUM_HEADLESS:-true}
      SCRAPER_RATE_LIMIT_REQUESTS: ${SCRAPER_RATE_LIMIT_REQUESTS:-10}
      SCRAPER_RATE_LIMIT_WINDOW_SECONDS: ${SCRAPER_RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-net

  agent-service:
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DB_NAME: ${DB_NAME:-nexus_core}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-net

  # ─── Celery Workers ───────────────────────────────────────────────────────
  celery-scraper-worker:
    build:
      context: ./services/scraper-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DB_NAME: ${DB_NAME:-nexus_core}
      SELENIUM_HEADLESS: ${SELENIUM_HEADLESS:-true}
      SCRAPER_RATE_LIMIT_REQUESTS: ${SCRAPER_RATE_LIMIT_REQUESTS:-10}
      SCRAPER_RATE_LIMIT_WINDOW_SECONDS: ${SCRAPER_RATE_LIMIT_WINDOW_SECONDS:-60}
    command: celery -A celery_app worker -Q scraper -c 4 -l info --without-gossip
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-net

  celery-agent-worker:
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DB_NAME: ${DB_NAME:-nexus_core}
    command: celery -A celery_app worker -Q agent -c 2 -l info --without-gossip
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-net

  # ─── Gateway ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - core-api
    networks:
      - nexus-net

volumes:
  mysql_data:
  redis_data:

networks:
  nexus-net:
    driver: bridge
