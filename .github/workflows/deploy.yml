name: Deploy Nexus Backend
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/nexus
            git checkout -- services/core-api/core_api/settings.py services/auth-service/auth_service/settings.py
            git pull origin main
            docker compose -f docker-compose.prod.yml build --no-cache celery-agent-worker
            docker compose -f docker-compose.prod.yml up -d --force-recreate celery-agent-worker
            echo "=== New tasks.py model default ==="
            grep "model_name" services/agent-service/tasks.py | head -3
            echo "Deploy complete"
