name: Deploy Backend to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 25m
          script: |
            set -e
            cd /opt/nexus

            # Pull latest
            git fetch origin main
            git reset --hard origin/main

            # Build only core services (skip scraper — needs Chrome/Selenium, build separately)
            docker compose -f docker-compose.prod.yml build \
              auth-service core-api agent-service celery-agent-worker

            # Restart core services only
            docker compose -f docker-compose.prod.yml up -d \
              mysql redis auth-service core-api agent-service celery-agent-worker nginx

            # Run migrations if needed
            sleep 10
            docker exec nexus-core-api-1 python manage.py migrate --fake-initial || true
            docker exec nexus-auth-service-1 python manage.py migrate --fake-initial || true

            # Health check
            curl -sf http://localhost:8080/health && echo "✅ Backend healthy"

      - name: Health check
        continue-on-error: true
        run: |
          for i in {1..8}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
              http://${{ secrets.SERVER_HOST }}:8080/health || echo "000")
            [ "$STATUS" = "200" ] && echo "✅ http://${{ secrets.SERVER_HOST }}:8080" && exit 0
            echo "Attempt $i: $STATUS — retrying..."
            sleep 10
          done
          echo "Health check inconclusive (server may be behind firewall)"
