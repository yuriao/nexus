name: Deploy Backend to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 25m
          script: |
            set -e
            cd /opt/nexus
            git fetch origin main
            git reset --hard origin/main

            # Update secrets in .env from GitHub secrets
            grep -q '^OPENAI_API_KEY' /opt/nexus/.env && \
              sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}|" /opt/nexus/.env || \
              echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> /opt/nexus/.env

            grep -q '^JWT_ACCESS_TOKEN_LIFETIME_MINUTES' /opt/nexus/.env && \
              sed -i 's|^JWT_ACCESS_TOKEN_LIFETIME_MINUTES=.*|JWT_ACCESS_TOKEN_LIFETIME_MINUTES=15|' /opt/nexus/.env || \
              echo 'JWT_ACCESS_TOKEN_LIFETIME_MINUTES=15' >> /opt/nexus/.env

            grep -q '^CORS_ALLOWED_ORIGINS' /opt/nexus/.env && \
              sed -i 's|^CORS_ALLOWED_ORIGINS=.*|CORS_ALLOWED_ORIGINS=http://localhost:8080,http://${{ secrets.SERVER_HOST }}:8080|' /opt/nexus/.env || \
              echo 'CORS_ALLOWED_ORIGINS=http://localhost:8080,http://${{ secrets.SERVER_HOST }}:8080' >> /opt/nexus/.env

            # Remove stale containers
            docker rm -f $(docker ps -aq --filter 'name=nexus-core-api') 2>/dev/null || true
            docker rm -f $(docker ps -aq --filter 'name=nexus-celery') 2>/dev/null || true

            # Build only core services (scraper excluded — Selenium/Chrome dependency)
            docker compose -f docker-compose.prod.yml build \
              auth-service core-api agent-service celery-agent-worker nginx

            # Start all core services
            docker compose -f docker-compose.prod.yml up -d \
              mysql redis auth-service core-api celery-agent-worker nginx

            # Reload nginx with latest config
            docker compose -f docker-compose.prod.yml restart nginx

            sleep 20

      - name: Health check
        run: |
          sleep 10
          curl -f http://${{ secrets.SERVER_HOST }}:8080/health || exit 1
          echo "✅ Health check passed"

      - name: Post-deploy summary
        run: |
          echo "✅ Deploy complete"
          echo "Backend: http://${{ secrets.SERVER_HOST }}:8080"
          echo "Dashboard: https://yuriao.github.io/nexus-dashboard/"
