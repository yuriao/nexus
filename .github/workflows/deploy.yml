name: Deploy Nexus Backend
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker logs nexus-celery-agent-worker-1 --tail 10 2>&1
            echo "---"
            docker exec nexus-mysql-1 mysql -unexus -pnexus_secret nexus_core -e "SELECT id, status FROM reports_researchreport ORDER BY created_at DESC LIMIT 2;" 2>/dev/null
