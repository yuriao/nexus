name: Deploy Nexus Backend
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild worker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/nexus
            git stash && git fetch origin main && git reset --hard origin/main
            docker compose -f docker-compose.prod.yml build --no-cache celery-agent-worker
            docker compose -f docker-compose.prod.yml up -d --force-recreate celery-agent-worker
            echo "Done"
