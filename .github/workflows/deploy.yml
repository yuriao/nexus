name: Deploy Nexus Backend
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy all fixes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/nexus
            git stash && git fetch origin main && git reset --hard origin/main

            # Ensure metrics table exists
            docker exec nexus-mysql-1 mysql -unexus -pnexus_secret nexus_core 2>/dev/null << 'SQL'
            CREATE TABLE IF NOT EXISTS companies_companymetric (
              id VARCHAR(32) NOT NULL PRIMARY KEY,
              company_id INT NOT NULL,
              report_id VARCHAR(36) NOT NULL DEFAULT '',
              metric_code VARCHAR(3) NOT NULL,
              metric_name VARCHAR(200) NOT NULL,
              unit VARCHAR(50) NOT NULL,
              value DECIMAL(18,4) NULL,
              confidence VARCHAR(20) NOT NULL DEFAULT 'low',
              source TEXT NOT NULL DEFAULT '',
              note TEXT NOT NULL DEFAULT '',
              calculated_at DATETIME(6) NOT NULL,
              created_at DATETIME(6) NOT NULL,
              INDEX idx_company_metric_calc (company_id, metric_code, calculated_at),
              CONSTRAINT fk_metric_company FOREIGN KEY (company_id) REFERENCES companies_company(id) ON DELETE CASCADE
            );
            SQL

            # Rebuild all affected services
            docker compose -f docker-compose.prod.yml build --no-cache \
              core-api celery-agent-worker celery-scraper-worker

            # Bring up everything including scraper worker (was missing!)
            docker compose -f docker-compose.prod.yml up -d --force-recreate \
              core-api celery-agent-worker celery-scraper-worker

            sleep 8
            echo "=== Running containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep nexus

            echo "=== Scraper worker queue check ==="
            docker exec $(docker ps --format '{{.Names}}' | grep scraper-worker) \
              celery -A celery_app inspect active_queues 2>/dev/null | grep -A2 "scraper" || echo "worker starting..."

            echo "Deploy complete"
