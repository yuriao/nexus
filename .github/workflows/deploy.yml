name: Deploy Nexus Backend
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/nexus
            git pull origin main
            docker compose -f docker-compose.prod.yml build celery-agent-worker
            docker compose -f docker-compose.prod.yml up -d celery-agent-worker
            docker compose -f docker-compose.prod.yml restart celery-agent-worker
            echo "Deploy complete"
