name: Deploy Nexus Backend
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy and check logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== Celery worker logs (last 50 lines) ==="
            docker logs nexus-celery-agent-worker-1 --tail 50 2>&1
            echo "=== model in tasks.py ==="
            grep "model_name" /opt/nexus/services/agent-service/tasks.py | head -3
